name: Test Suite
on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '22.13.1'
      - name: Install Corepack
        run: npm install --global corepack@0.34.6
      - name: Enable corepack
        run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: ${{ matrix.env.DB == 'mysql8' && 'mysql:8.0' || '' }}
        env:
          MYSQL_DATABASE: km_testing
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306
        options: >-
          --tmpfs /var/lib/mysql
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    strategy:
      matrix:
        node: [ '22.13.1', '24.14.1' ]
        env:
          - DB: better-sqlite3
            NODE_ENV: testing-better-sqlite3
          - DB: mysql8
            NODE_ENV: testing-mysql
    env:
      DB: ${{ matrix.env.DB }}
      NODE_ENV: ${{ matrix.env.NODE_ENV }}
      database__connection__password: root
    name: Node ${{ matrix.node }} - ${{ matrix.env.DB }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node }}
      - name: Install Corepack
        run: npm install --global corepack@0.34.6
      - name: Enable corepack
        run: corepack enable

      - name: Set env vars (MySQL)
        if: contains(matrix.env.DB, 'mysql')
        run: |
          echo "database__connection__host=127.0.0.1" >> $GITHUB_ENV
          echo "database__connection__port=${{ job.services.mysql.ports['3306'] }}" >> $GITHUB_ENV

      - run: pnpm install --frozen-lockfile
      - run: pnpm coverage

  ghost-consumer-smoke:
    name: Ghost consumer smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          path: knex-migrator
          persist-credentials: false
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: TryGhost/Ghost
          path: Ghost
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24.18.0'
      - name: Install Corepack
        run: npm install --global corepack@0.34.6
      - name: Enable corepack
        run: corepack enable
      - name: Install knex-migrator dependencies
        working-directory: knex-migrator
        run: pnpm install --frozen-lockfile
      - name: Install Ghost dependencies
        working-directory: Ghost
        run: pnpm install --frozen-lockfile --filter ghost...
      - name: Build Ghost Workspace dependencies
        run: pnpm --filter ghost^... build
        working-directory: Ghost
      - name: Use linked knex-migrator in Ghost
        working-directory: Ghost/ghost/core
        run: pnpm link ${{ github.workspace }}/knex-migrator
      - name: Run Ghost consumer smoke
        working-directory: knex-migrator
        env:
          GHOST_CORE_PATH: ${{ github.workspace }}/Ghost
          KNEX_MIGRATOR_BIN: ${{ github.workspace }}/Ghost/ghost/core/node_modules/.bin/knex-migrator
          KNEX_MIGRATOR_CWD: ${{ github.workspace }}/Ghost/ghost/core
        run: pnpm smoke:ghost

  required-checks-pass:
    name: Required checks pass
    if: always()
    needs:
      - lint
      - test
      - ghost-consumer-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
